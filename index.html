<header class="site-header">
  <a class="brand" href="#/">
    <svg class="icon accent"><use href="#i-shield"/></svg>
    <span>Твоє право</span>
  </a>
  <div class="header-controls">
    <!-- Архів поки не лінкуємо з інших сторінок: доступ лише за прямим посиланням #/archive.
         Щоб відкрити публічно — розкоментувати.
    <a class="header-link" href="#/archive" title="Архів злочинів ТЦК і політичних справ">
      <svg class="icon"><use href="#i-books"/></svg>
      <span>Архів</span>
    </a>
    -->
    <label class="status-picker" title="Ваш статус впливає на поради">
      <svg class="icon"><use href="#i-user"/></svg>
      <select id="status-select" aria-label="Ваш статус"></select>
    </label>
  </div>
</header>

<div id="panic-overlay" class="panic-overlay" hidden></div>
