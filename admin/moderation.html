<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Модерація архіву — Твоє право</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root { --bg:#f7f6f2; --surface:#fff; --border:#ddd; --text:#1d1d1b; --muted:#777; --accent:#185fa5; --ok:#0f6e56; --danger:#a32d2d; --warn:#854f0b; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#161614; --surface:#1f1f1d; --border:#333; --text:#f0efeb; --muted:#999; --accent:#85b7eb; } }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.5; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  h1 { font-size:18px; margin:0; }
  main { max-width:820px; margin:0 auto; padding:16px 20px 80px; }
  .card { border:1px solid var(--border); border-radius:10px; background:var(--surface); padding:14px 16px; margin:0 0 14px; }
  .meta { font-size:13px; color:var(--muted); margin:2px 0; }
  .summary { margin:8px 0; }
  .ev, .sub { border-left:3px solid var(--border); padding:4px 0 4px 10px; margin:6px 0; font-size:13.5px; }
  .sub { border-left-color:var(--warn); }
  a { color:var(--accent); word-break:break-all; }
  .actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  button, input { font:inherit; }
  button { border:1px solid var(--border); border-radius:8px; padding:8px 14px; background:var(--surface); color:var(--text); cursor:pointer; }
  button.ok { background:var(--ok); border-color:var(--ok); color:#fff; }
  button.no { background:var(--danger); border-color:var(--danger); color:#fff; }
  input.merge { border:1px solid var(--border); border-radius:8px; padding:7px 10px; width:150px; }
  .empty, .msg { color:var(--muted); padding:20px 0; }
  .badge { font-size:11px; background:var(--warn); color:#fff; border-radius:4px; padding:1px 6px; }
</style>
</head>
<body>
<header>
  <h1>🛡️ Модерація архіву</h1>
  <span id="whoami" class="meta"></span>
</header>
<main>
  <p class="meta">Черга неперевірених записів. Дії журналюються (chain of custody). Сторінка має бути за Cloudflare Access.</p>
  <div id="queue"><p class="msg">Завантаження…</p></div>
</main>
<script>
const esc = (s) => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const TYPE = {}; // код→опис не тягнемо; показуємо коди
async function api(path, method="GET", body){
  const r = await fetch(path, { method, headers: body?{"Content-Type":"application/json"}:{}, body: body?JSON.stringify(body):undefined });
  if(!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
function actorRow(a){ return `<span class="badge" style="background:#555">${esc(a)}</span>`; }
function render(q){
  const el = document.getElementById("queue");
  if(!q.length){ el.innerHTML = `<p class="empty">✓ Черга порожня — усе перевірено.</p>`; return; }
  el.innerHTML = q.map(inc => `
    <div class="card" data-id="${esc(inc.id)}">
      <div class="meta">${esc(inc.category)} · ${esc(inc.type)} · ${esc(inc.oblast)}${inc.city?", "+esc(inc.city):""} · ${esc(inc.incident_date||"без дати")}${inc.date_approx?" (≈)":""}</div>
      <div class="meta">id: ${esc(inc.id)} · створено: ${esc(inc.created_at)}</div>
      <div class="summary">${esc(inc.summary)}</div>
      ${(inc.evidence||[]).map(e=>`<div class="ev">🎥 <a href="${esc(e.url)}" target="_blank" rel="noopener noreferrer">${esc(e.url)}</a>${e.snapshot_url?` · <a href="${esc(e.snapshot_url)}" target="_blank" rel="noopener">копія</a>`:""}<br><small>${esc(e.platform||"")} · ${esc(e.canonical_id||"")} · hash ${esc((e.hash||"").slice(0,16))}…</small></div>`).join("")}
      ${(inc.submissions||[]).map(s=>`<div class="sub">✉️ контакт: ${esc(s.contact||"— (анонім)")}${s.is_duplicate?' <span class="badge">дубль-свідок</span>':""}</div>`).join("")}
      <div class="actions">
        <button class="ok" data-act="verify">✓ Опублікувати</button>
        <button class="no" data-act="reject">✕ Відхилити</button>
        <input class="merge" placeholder="id для об'єднання">
        <button data-act="merge">⇄ Об'єднати</button>
      </div>
    </div>`).join("");
  el.querySelectorAll(".card").forEach(card => {
    const id = card.dataset.id;
    card.querySelector('[data-act=verify]').onclick = () => act("/api/mod/verify",{id},card);
    card.querySelector('[data-act=reject]').onclick = () => { const note = prompt("Причина відхилення (не обов'язково):")||""; act("/api/mod/reject",{id,note},card); };
    card.querySelector('[data-act=merge]').onclick = () => { const into = card.querySelector(".merge").value.trim(); if(!into) return alert("Вкажіть id інциденту, з яким об'єднати."); act("/api/mod/merge",{id,into},card); };
  });
}
async function act(path, body, card){
  try { await api(path,"POST",body); card.remove(); if(!document.querySelectorAll(".card").length) render([]); }
  catch(e){ alert("Помилка: "+e.message); }
}
(async function(){
  try {
    const data = await api("/api/mod/queue");
    render(data.queue||[]);
  } catch(e){
    document.getElementById("queue").innerHTML = `<p class="msg">Не вдалося завантажити чергу (${esc(e.message)}). Перевір, що маршрути /admin/* і /api/mod/* за Cloudflare Access, і що D1 налаштовано.</p>`;
  }
})();
</script>
</body>
</html>
